spring.application.name=interview-prep

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_prep
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Run vector schema SQL on startup (idempotent CREATE IF NOT EXISTS)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:vector_schema.sql

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=http://localhost:5173

# AI provider: "claude" (default, Anthropic) or "groq"
# To switch to Groq: set ai.provider=groq and groq.api.key=your-key
ai.provider=${AI_PROVIDER:claude}

# Claude / Anthropic (via local proxy)
claude.api.key=${ANTHROPIC_AUTH_TOKEN:}
claude.api.base-url=${ANTHROPIC_BASE_URL:https://api.anthropic.com}
claude.model=${ANTHROPIC_MODEL:claude-sonnet-latest}

# Groq (uncomment and set key when switching)
groq.api.key=${GROQ_API_KEY:}
groq.api.base-url=https://api.groq.com/openai
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# OpenAI Embeddings (via local proxy)
openai.api.key=${ANTHROPIC_AUTH_TOKEN:}
openai.api.base-url=http://localhost:6655/openai
openai.embedding.model=text-embedding-3-small

# Logging
logging.level.com.interviewprep=INFO

