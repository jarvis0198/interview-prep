# Production profile — activate with: --spring.profiles.active=prod
# or SPRING_PROFILES_ACTIVE=prod environment variable

# Database — Railway provides DATABASE_URL as jdbc:postgresql://... (use JDBC_DATABASE_URL)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/interview_prep}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA — update creates tables on first deploy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS — set to your actual frontend domain
cors.allowed-origins=${FRONTEND_URL:https://yourdomain.com}

# AI provider: set via env var
ai.provider=${AI_PROVIDER:groq}
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# JWT — use a strong secret in production (min 256-bit)
jwt.secret=${JWT_SECRET:aW50ZXJ2aWV3UHJlcFNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNg==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator — health check for Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging — reduce noise in production
logging.level.com.interviewprep=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.root=WARN
